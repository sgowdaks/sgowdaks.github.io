<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Space — Shivani Gowda KS</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">

  <style>
    :root {
      --primary-color: #333333;
      --secondary-color: #555555;
      --accent-color: #666666;
      --text-color: #222222;
      --text-light: #666666;
      --text-muted: #666666;
      --bg-color: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #e9ecef;
      --surface-color: #f1f3f4;
      --border-color: #dee2e6;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.05);
      --gradient: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== PAGE HERO ===== */
    .page-hero {
      background: linear-gradient(135deg, var(--bg-color) 0%, var(--bg-secondary) 100%);
      text-align: center;
      padding: 5rem 2rem 4rem;
      border-bottom: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }

    .page-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23333333' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
      pointer-events: none;
    }

    .page-hero h1 {
      font-family: 'Source Serif 4', 'Georgia', serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--text-color);
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
    }

    .page-hero p {
      font-size: 1.15rem;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }

    /* ===== MAIN LAYOUT ===== */
    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    /* ===== GALLERY ===== */
    .gallery-heading {
      font-family: 'Source Serif 4', 'Georgia', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-color);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .gallery-heading i {
      color: var(--accent-color);
      font-size: 1.4rem;
    }

    .gallery-subheading {
      color: var(--text-light);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    /* ===== PHOTO CARD ===== */
    .photo-card {
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-light);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .photo-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
    }

    /* Top gradient bar */
    .photo-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient);
      z-index: 1;
    }

    /* ---- Image placeholder ---- */
    .photo-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--surface-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      transition: background 0.3s ease;
    }

    .photo-placeholder i {
      font-size: 2.4rem;
      color: var(--border-color);
    }

    .photo-card:hover .photo-placeholder {
      background: var(--bg-tertiary);
    }

    /* ---- Actual image (shown when src is set) ---- */
    .photo-card img.photo-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-bottom: 1px solid var(--border-color);
      display: block;
    }

    /* ---- Caption ---- */
    .photo-caption {
      padding: 1rem 1.1rem 1.1rem;
    }

    .photo-caption .place {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-color);
      margin-bottom: 0.3rem;
    }

    .photo-caption .place i {
      color: var(--accent-color);
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .photo-caption .date {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .photo-caption .date i {
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    /* ===== BACK LINK ===== */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 2.5rem;
      padding: 0.5rem 0;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--primary-color);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .page-hero {
        padding: 3.5rem 1.5rem 2.5rem;
      }
      .page-hero h1 {
        font-size: 2rem;
      }
      .page-hero p {
        font-size: 1rem;
      }
      .main-content {
        padding: 2.5rem 1.2rem 4rem;
      }
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      .page-hero h1 {
        font-size: 1.6rem;
      }
      .gallery-grid {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
    }

    @media (max-width: 360px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header></header>

  <section class="page-hero">
    <h1>My Personal Space</h1>
    <p>A little window into the world outside the terminal, moments I've captured.</p>
  </section>

  <div class="main-content">
    <a href="index.html" class="back-link">
      <i class="fas fa-arrow-left"></i>
      Back to home
    </a>

    <h2 class="gallery-heading">
      <i class="fas fa-images"></i>
      Gallery
    </h2>
    <p class="gallery-subheading">Photos from my travels and adventures. More coming soon!</p>

    <!-- GALLERY_START -->
    <div class="gallery-grid">

      <div class="photo-card">
        <img class="photo-img" src="https://little-forest-1bc3.shivanigowdaks.workers.dev/pw/AP1GczOFrQ3QhseSIRkhVFGPSUlAK0ElunQcQoC4WGYDbfz3RpFk1L-d_uhGTxYpkFlAD7tbDMR37lbJr8sAKjQCTh6DU1P821qwxP5tiZPQpkbe0nTGQpVO=w900" alt="Olalla Canyon Ridge, WA" loading="lazy">
        <div class="photo-caption">
          <div class="place"><i class="fas fa-map-marker-alt"></i> Olalla Canyon Ridge, WA</div>
          <div class="date"><i class="far fa-calendar-alt"></i> May, 2026</div>
        </div>
      </div>

      <div class="photo-card">
        <img class="photo-img" src="https://little-forest-1bc3.shivanigowdaks.workers.dev/pw/AP1GczMJDdJFfX0VPmCk52UZa1-5sSmhByrvocxrZUcXgU3a3qabBF0EMRAKr-ICy6yKZCcAosE01VZ1rvtWLKeDovX9Duyk0kT-fsb3Asgp2iO-u-TdBI-P=w900" alt="Home" loading="lazy">
        <div class="photo-caption">
          <div class="place"><i class="fas fa-map-marker-alt"></i> Home</div>
          <div class="date"><i class="far fa-calendar-alt"></i> April, 2026</div>
        </div>
      </div>

    </div>
    <!-- GALLERY_END -->
  </div>

  <footer></footer>

  <script src="js/common.js"></script>
</body>
</html>
